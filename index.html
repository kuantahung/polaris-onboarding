<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>倍安保險 — 報聘文件配置系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #f1f5f9; }
        .cb-item { width: 20px; height: 20px; cursor: pointer; }
        .btn-gradient { background: linear-gradient(135deg, #0d9488 0%, #0891b2 100%); }
    </style>
</head>
<body class="p-2 sm:p-4">

    <div class="max-w-2xl mx-auto bg-white shadow-xl rounded-2xl overflow-hidden border border-slate-200">
        <div class="bg-slate-900 text-white p-5">
            <h1 class="font-bold text-lg text-teal-400">POLARIS 報聘文件配置系統</h1>
            <p class="text-xs text-slate-400 mt-1">選取所需文件，系統將為您自動依序下載</p>
        </div>

        <div class="p-4 sm:p-6 space-y-6">
            
            <div>
                <h2 class="font-bold text-sm text-slate-700 mb-3 border-l-4 border-teal-500 pl-2">一、基本文件</h2>
                <div class="space-y-2">
                    <label class="flex items-center p-3 border rounded-xl hover:bg-slate-50 cursor-pointer transition">
                        <input type="checkbox" class="cb-item" data-url="https://drive.google.com/file/d/1bU9TkMSUDB3enH-hiy5CydlkG7mmPV-T/view?usp=drive_link" value="倍安報聘申請書">
                        <span class="ml-3 text-sm font-medium">1. 倍安報聘申請書</span>
                    </label>
                    <label class="flex items-center p-3 border rounded-xl hover:bg-slate-50 cursor-pointer transition">
                        <input type="checkbox" class="cb-item" data-url="https://drive.google.com/file/d/10t6uokSlQGlRO2Bp1bhCpyD6IoS-SSnM/view?usp=drive_link" value="名片印製申請書">
                        <span class="ml-3 text-sm font-medium">2. 名片印製申請書</span>
                    </label>
                    <label class="flex items-center p-3 border rounded-xl hover:bg-slate-50 cursor-pointer transition">
                        <input type="checkbox" class="cb-item" data-url="https://drive.google.com/file/d/1qFb5NpgmcVRoBYTqO9qEluTJ5RtZt7BJ/view?usp=drive_link" value="付費APP帳號申請異動書">
                        <span class="ml-3 text-sm font-medium">3. 付費APP帳號申請異動書</span>
                    </label>
                    <label class="flex items-center p-3 border rounded-xl hover:bg-slate-50 cursor-pointer transition">
                        <input type="checkbox" class="cb-item" data-url="https://drive.google.com/file/d/135grrGGi55jPI6FjChzrPnzA8_gBjNS1/view?usp=drive_link" value="明台產物-輔銷系統帳號聲明書">
                        <span class="ml-3 text-sm font-medium">4. 明台產物-輔銷系統帳號聲明書</span>
                    </label>
                    <label class="flex items-center p-3 border rounded-xl hover:bg-slate-50 cursor-pointer transition">
                        <input type="checkbox" class="cb-item" data-url="https://drive.google.com/file/d/1OFD68iRs2wdQINXKhxvub5ewB60bLoP0/view?usp=drive_link" value="收費同意書">
                        <span class="ml-3 text-sm font-medium">5. 收費同意書</span>
                    </label>
                </div>
            </div>

            <div>
                <h2 class="font-bold text-sm text-slate-700 mb-3 border-l-4 border-teal-500 pl-2">二、個人資格申請書</h2>
                <div class="space-y-2">
                    <label class="flex items-center p-3 border rounded-xl hover:bg-slate-50 cursor-pointer transition">
                        <input type="checkbox" class="cb-item" data-url="https://drive.google.com/file/d/1rEdSs17_Zz8jejUA3wF7s4snQsOTbVh4/view?usp=drive_link" value="壽險資格登錄申請書">
                        <span class="ml-3 text-sm font-medium">1. 壽險資格登錄申請</span>
                    </label>
                    <label class="flex items-center p-3 border rounded-xl hover:bg-slate-50 cursor-pointer transition">
                        <input type="checkbox" class="cb-item" data-url="https://drive.google.com/file/d/160wa15bs90cLT6gx_hZ6OKK5Ji6tzPju/view?usp=drive_link" value="外幣資格登錄申請書">
                        <span class="ml-3 text-sm font-medium">2. 外幣資格登錄申請</span>
                    </label>
                </div>
            </div>

            <button onclick="startDownload()" class="w-full btn-gradient text-white font-bold py-4 rounded-xl shadow-lg hover:opacity-90 active:scale-[0.98] transition">
                🚀 一鍵下載所有勾選檔案
            </button>

            <a href="https://drive.google.com/drive/folders/1iKU0n8D_tKqdC8niOr7wHPShEuQ10WXC?usp=drive_link" target="_blank" class="block w-full text-center border-2 border-teal-500 text-teal-700 font-bold py-3 rounded-xl hover:bg-teal-50 transition text-sm">
                📂 進入 Google Drive 完整報聘文件資料庫
            </a>
        </div>
    </div>

    <script>
        function startDownload() {
            const checked = document.querySelectorAll('.cb-item:checked');
            if (checked.length === 0) {
                alert('請先勾選您需要的文件！');
                return;
            }

            alert('系統將開始依序下載，請留意瀏覽器下載提示。');

            checked.forEach((item, index) => {
                setTimeout(() => {
                    // 解析 File ID
                    const match = item.dataset.url.match(/\/d\/([a-zA-Z0-9-_]+)/);
                    if (match && match[1]) {
                        const fileId = match[1];
                        const downloadUrl = `https://drive.google.com/uc?export=download&id=${fileId}`;
                        
                        // 使用 window.open 觸發，各瀏覽器相容性最高
                        window.open(downloadUrl, '_blank');
                    }
                }, index * 1200); // 間隔 1.2 秒避免被封鎖
            });
        }
    </script>
</body>
</html>
