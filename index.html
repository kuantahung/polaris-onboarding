<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>倍安保險 — 報聘文件配置系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --teal: #0d9488;
            --teal-light: #14b8a6;
            --teal-dark: #0f766e;
            --slate-bg: #0f172a;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Noto Sans TC', 'Inter', sans-serif;
            background-color: #f1f5f9;
            -webkit-tap-highlight-color: transparent;
            min-height: 100svh;
        }

        /* ── 捲軸 ── */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

        /* ── Checkbox 自訂 ── */
        .cb-item {
            appearance: none;
            -webkit-appearance: none;
            width: 18px; height: 18px;
            border: 2px solid #cbd5e1;
            border-radius: 5px;
            background: white;
            cursor: pointer;
            position: relative;
            transition: border-color .15s, background .15s;
            flex-shrink: 0;
        }
        .cb-item:checked {
            background: var(--teal);
            border-color: var(--teal);
        }
        .cb-item:checked::after {
            content: '';
            position: absolute;
            left: 4px; top: 1px;
            width: 6px; height: 10px;
            border: 2px solid white;
            border-top: none;
            border-left: none;
            transform: rotate(45deg);
        }
        .cb-item:focus-visible { outline: 2px solid var(--teal); outline-offset: 2px; }

        /* ── 列項 hover ── */
        .doc-row { transition: background .15s; }
        .doc-row:hover { background-color: #f8fafc; }

        /* ── 主下載鈕 ── */
        .btn-primary {
            background: linear-gradient(135deg, var(--teal) 0%, #0891b2 100%);
            transition: opacity .15s, transform .1s;
        }
        .btn-primary:hover:not(:disabled) { opacity: .92; }
        .btn-primary:active:not(:disabled) { transform: scale(.98); }
        .btn-primary:disabled { opacity: .4; cursor: not-allowed; }

        /* ── 狀態 chip ── */
        .chip { font-size: 10px; padding: 2px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
        .chip-default  { background: #1e293b; color: #64748b; }
        .chip-loading  { background: #0d3d38; color: #2dd4bf; animation: pulse 1.2s infinite; }
        .chip-done     { background: #052e16; color: #4ade80; }

        @keyframes pulse { 0%,100%{ opacity:1 } 50%{ opacity:.5 } }

        /* ── 彈窗 ── */
        .modal-bg { backdrop-filter: blur(4px); }

        /* ── 進度條 ── */
        #progress-bar { transition: width .4s ease; }

        /* ── 分類標頭強調線 ── */
        .cat-accent { width: 3px; height: 16px; background: var(--teal); border-radius: 2px; flex-shrink: 0; }
    </style>
</head>
<body class="text-slate-800 antialiased flex flex-col">

<div id="step-modal" class="hidden fixed inset-0 bg-slate-950/80 modal-bg z-50 flex items-end sm:items-center justify-center p-0 sm:p-4">
    <div class="bg-slate-900 border border-slate-700 rounded-t-2xl sm:rounded-2xl w-full sm:max-w-sm shadow-2xl overflow-hidden">
        <div class="h-1 bg-slate-800">
            <div id="step-progress-bar" class="h-1 bg-teal-500 transition-all duration-300" style="width:0%"></div>
        </div>
        <div class="p-6">
            <div class="flex items-center justify-between mb-4">
                <span class="text-[11px] text-slate-500 font-medium tracking-wider">下載進度</span>
                <span id="step-counter" class="text-[11px] text-teal-400 font-semibold bg-teal-500/10 px-2 py-0.5 rounded-full"></span>
            </div>
            <div class="bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 mb-5 text-center">
                <p class="text-[11px] text-slate-500 mb-1">目前下載</p>
                <p id="step-filename" class="text-sm font-semibold text-white leading-snug"></p>
            </div>
            <button id="step-download-btn" type="button"
               onclick="onStepClick()"
               class="btn-primary flex items-center justify-center gap-2 w-full text-white font-bold py-4 rounded-xl text-sm text-center shadow-lg mb-3">
                <span id="step-btn-label">📥 點此下載這個檔案</span>
            </button>
            <button type="button" onclick="advanceStep(false)"
                class="w-full text-slate-500 hover:text-slate-300 text-xs py-2 transition-colors">
                略過，繼續下一個 →
            </button>
        </div>
    </div>
</div>

<div id="done-modal" class="hidden fixed inset-0 bg-slate-950/75 modal-bg z-50 flex items-end sm:items-center justify-center p-0 sm:p-4">
    <div class="bg-white rounded-t-2xl sm:rounded-2xl w-full sm:max-w-sm p-6 shadow-2xl text-center">
        <div class="text-4xl mb-3">✅</div>
        <h3 class="text-base font-bold text-slate-900">全部處理完成！</h3>
        <p id="done-body" class="text-sm text-slate-500 mt-2 leading-relaxed"></p>
        <button onclick="closeDoneModal()"
            class="btn-primary mt-5 w-full text-white text-sm font-semibold py-3.5 rounded-xl shadow">
            關閉
        </button>
    </div>
</div>

<header class="bg-slate-900 text-white shadow-lg">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between gap-3">
        <div class="flex items-center gap-3">
            <div class="bg-teal-500 text-slate-900 font-bold px-2.5 py-1 rounded text-[11px] tracking-widest">POLARIS</div>
            <h1 class="text-sm sm:text-base font-semibold tracking-wide">報聘文件配置系統</h1>
        </div>
        <div class="flex items-center gap-1.5 text-[11px] text-teal-400 bg-teal-500/10 border border-teal-500/20 px-2.5 py-1 rounded-full">
            <span class="w-1.5 h-1.5 bg-teal-400 rounded-full animate-pulse"></span>
            手機全面支援
        </div>
    </div>
</header>

<main class="flex-grow max-w-6xl w-full mx-auto px-4 sm:px-6 py-6 grid grid-cols-1 lg:grid-cols-12 gap-6">

    <section class="lg:col-span-7 space-y-4">

        <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="px-4 sm:px-5 py-3.5 bg-slate-50 border-b border-slate-200 flex items-center justify-between">
                <h2 class="font-bold text-sm flex items-center gap-2">
                    <span class="cat-accent"></span> 一、基本文件
                </h2>
                <div class="flex gap-4 text-xs">
                    <button type="button" onclick="toggleCat('cat1',false)" class="text-slate-400 hover:text-slate-600">取消</button>
                    <button type="button" onclick="toggleCat('cat1',true)"  class="text-teal-600 hover:text-teal-700 font-semibold">全選</button>
                </div>
            </div>
            <div class="divide-y divide-slate-100 px-2 sm:px-3">
                <label class="doc-row flex items-center justify-between py-3 px-2 rounded-lg cursor-pointer">
                    <div class="flex items-center gap-3 min-w-0">
                        <input type="checkbox" class="cb-item" data-cat="cat1" value="倍安報聘申請書" data-url="https://drive.google.com/file/d/1bU9TkMSUDB3enH-hiy5CydlkG7mmPV-T/view?usp=drive_link">
                        <span class="text-xs sm:text-sm font-medium text-slate-700 truncate">1. 倍安報聘申請書</span>
                    </div>
                    <span class="chip chip-default ml-3">必備</span>
                </label>
                <label class="doc-row flex items-center justify-between py-3 px-2 rounded-lg cursor-pointer">
                    <div class="flex items-center gap-3 min-w-0">
                        <input type="checkbox" class="cb-item" data-cat="cat1" value="名片印製申請書" data-url="https://drive.google.com/file/d/10t6uokSlQGlRO2Bp1bhCpyD6IoS-SSnM/view?usp=drive_link">
                        <span class="text-xs sm:text-sm font-medium text-slate-700 truncate">2. 名片印製申請書</span>
                    </div>
                    <span class="chip chip-default ml-3">行政</span>
                </label>
                <label class="doc-row flex items-center justify-between py-3 px-2 rounded-lg cursor-pointer">
                    <div class="flex items-center gap-3 min-w-0">
                        <input type="checkbox" class="cb-item" data-cat="cat1" value="付費APP帳號申請異動書" data-url="https://drive.google.com/file/d/1qFb5NpgmcVRoBYTqO9qEluTJ5RtZt7BJ/view?usp=drive_link">
                        <span class="text-xs sm:text-sm font-medium text-slate-700 truncate">3. 付費APP帳號申請異動書 <span class="text-slate-400 text-[11px] hidden sm:inline">(雄好分析、創時)</span></span>
                    </div>
                    <span class="chip chip-default ml-3">工具</span>
                </label>
                <label class="doc-row flex items-center justify-between py-3 px-2 rounded-lg cursor-pointer">
                    <div class="flex items-center gap-3 min-w-0">
                        <input type="checkbox" class="cb-item" data-cat="cat1" value="明台產物-輔銷系統帳號聲明書" data-url="https://drive.google.com/file/d/135grrGGi55jPI6FjChzrPnzA8_gBjNS1/view?usp=drive_link">
                        <span class="text-xs sm:text-sm font-medium text-slate-700 truncate">4. 明台產物-輔銷系統帳號聲明書</span>
                    </div>
                    <span class="chip ml-3" style="background:#431407;color:#fb923c;">選填</span>
                </label>
                <label class="doc-row flex items-center justify-between py-3 px-2 rounded-lg cursor-pointer">
                    <div class="flex items-center gap-3 min-w-0">
                        <input type="checkbox" class="cb-item" data-cat="cat1" value="收費同意書" data-url="https://drive.google.com/file/d/1OFD68iRs2wdQINXKhxvub5ewB60bLoP0/view?usp=drive_link">
                        <span class="text-xs sm:text-sm font-medium text-slate-700 truncate">5. 收費同意書</span>
                    </div>
                    <span class="chip chip-default ml-3">首次增員</span>
                </label>
                <label class="doc-row flex items-center justify-between py-3 px-2 rounded-lg cursor-pointer">
                    <div class="flex items-center gap-3 min-w-0">
