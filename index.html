<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --teal: #0d9488;
            --teal-light: #14b8a6;
            --teal-dark: #0f766e;
            --slate-bg: #0f172a;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Noto Sans TC', 'Inter', sans-serif;
            background-color: #f1f5f9;
            -webkit-tap-highlight-color: transparent;
            min-height: 100svh;
        }

        /* ── 捲軸 ── */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

        /* ── Checkbox 自訂 ── */
        .cb-item {
            appearance: none;
            -webkit-appearance: none;
            width: 18px; height: 18px;
            border: 2px solid #cbd5e1;
            border-radius: 5px;
            background: white;
            cursor: pointer;
            position: relative;
            transition: border-color .15s, background .15s;
            flex-shrink: 0;
        }
        .cb-item:checked {
            background: var(--teal);
            border-color: var(--teal);
        }
        .cb-item:checked::after {
            content: '';
            position: absolute;
            left: 4px; top: 1px;
            width: 6px; height: 10px;
            border: 2px solid white;
            border-top: none;
            border-left: none;
            transform: rotate(45deg);
        }
        .cb-item:focus-visible { outline: 2px solid var(--teal); outline-offset: 2px; }

        /* ── 列項 hover ── */
        .doc-row { transition: background .15s; }
        .doc-row:hover { background-color: #f8fafc; }

        /* ── 主下載鈕 ── */
        .btn-primary {
            background: linear-gradient(135deg, var(--teal) 0%, #0891b2 100%);
            transition: opacity .15s, transform .1s;
        }
        .btn-primary:hover:not(:disabled) { opacity: .92; }
        .btn-primary:active:not(:disabled) { transform: scale(.98); }
        .btn-primary:disabled { opacity: .4; cursor: not-allowed; }

        /* ── 狀態 chip ── */
        .chip { font-size: 10px; padding: 2px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
        .chip-default  { background: #1e293b; color: #64748b; }
        .chip-loading  { background: #0d3d38; color: #2dd4bf; animation: pulse 1.2s infinite; }
        .chip-done     { background: #052e16; color: #4ade80; }

        @keyframes pulse { 0%,100%{ opacity:1 } 50%{ opacity:.5 } }

        /* ── 彈窗 ── */
        .modal-bg { backdrop-filter: blur(4px); }

        /* ── 進度條 ── */
        #progress-bar { transition: width .4s ease; }

        /* ── 分類標頭強調線 ── */
        .cat-accent { width: 3px; height: 16px; background: var(--teal); border-radius: 2px; flex-shrink: 0; }
    </style>
</head>

<!-- ═══════════════════════════════════════
     JavaScript
═══════════════════════════════════════ -->
<script>
/* ── 年份 ── */
document.getElementById('year').textContent = new Date().getFullYear();

/* ── 裝置偵測 ── */
const isIOS     = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
const isAndroid = /Android/.test(navigator.userAgent);
const isMobile  = isIOS || isAndroid;

/* ── 即時勾選計數 ── */
document.querySelectorAll('.cb-item').forEach(cb => {
    cb.addEventListener('change', updateCount);
});

function updateCount() {
    const n = document.querySelectorAll('.cb-item:checked').length;
    document.getElementById('item-count').textContent = `${n} 項已選`;
}

/* ── 分類全選／取消 ── */
function toggleCat(cat, status) {
    document.querySelectorAll(`[data-cat="${cat}"]`).forEach(cb => cb.checked = status);
    updateCount();
}

/* ── 清空 ── */
function clearAll() {
    document.querySelectorAll('.cb-item').forEach(cb => cb.checked = false);
    updateCount();
    document.getElementById('empty-state').classList.remove('hidden');
    document.getElementById('list-content').classList.add('hidden');
    document.getElementById('btn-download').disabled = true;
    document.getElementById('progress-wrap').classList.add('hidden');
}

/* ── 取得已勾選項目 ── */
function getSelected() {
    return [...document.querySelectorAll('.cb-item:checked')].map(cb => ({
        name: cb.value,
        url:  cb.dataset.url
    }));
}

/* ── 擷取 Drive File ID ── */
function extractFileId(url) {
    const m = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
    return m ? m[1] : null;
}

/* ── 確認配置 ── */
function generatePack() {
    const items = getSelected();
    const emptyState  = document.getElementById('empty-state');
    const listContent = document.getElementById('list-content');
    const linksOutput = document.getElementById('links-output');
    const btnDownload = document.getElementById('btn-download');
    const countLabel  = document.getElementById('item-count');

    countLabel.textContent = `${items.length} 項已選`;

    if (items.length === 0) {
        emptyState.classList.remove('hidden');
        listContent.classList.add('hidden');
        btnDownload.disabled = true;
        alert('請至少勾選一項報聘文件！');
        return;
    }

    emptyState.classList.add('hidden');
    listContent.classList.remove('hidden');
    btnDownload.disabled = false;

    /* 渲染文件清單 */
    linksOutput.innerHTML = '';
    items.forEach((item, idx) => {
        const row = document.createElement('div');
        row.className = 'flex items-center justify-between gap-2 bg-slate-800/80 border border-slate-700/40 px-3 py-2.5 rounded-lg';
        row.innerHTML = `
            <div class="flex items-center gap-2 min-w-0">
                <span class="text-slate-500 text-[11px] font-mono shrink-0">${idx+1}</span>
                <span class="text-slate-200 text-xs font-medium truncate">${item.name}</span>
            </div>
            <span id="status-${idx}" class="chip chip-default">待下載</span>
        `;
        linksOutput.appendChild(row);
    });

    /* 滾動到右側面板（手機） */
    if (isMobile) {
        document.getElementById('btn-download').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
}

/* ── 觸發下載流程（顯示說明彈窗） ── */
function triggerDownloadFlow() {
    const icon  = document.getElementById('modal-icon');
    const title = document.getElementById('modal-title');
    const body  = document.getElementById('modal-body');

    if (isIOS) {
        icon.textContent  = '📱';
        title.textContent = 'iPhone 下載說明';
        body.innerHTML    = `系統將逐一在新分頁開啟 Google Drive 預覽頁，<br>
            請在每個分頁點右上角 <b>「⋯」→「下載」</b>，即可儲存至手機。<br><br>
            <span class="text-teal-500 font-medium">提示：請允許瀏覽器開啟新分頁。</span>`;
    } else if (isAndroid) {
        icon.textContent  = '📲';
        title.textContent = 'Android 下載說明';
        body.innerHTML    = `系統將自動依序下載所有檔案。<br>
            下載完成後，請至手機「下載」資料夾查看。`;
    } else {
        icon.textContent  = '💻';
        title.textContent = '電腦端批次下載';
        body.innerHTML    = `系統將依序下載所有勾選檔案，<br>
            請注意瀏覽器是否允許多檔下載。`;
    }

    document.getElementById('tutorial-modal').classList.remove('hidden');
}

function closeTutorial() {
    document.getElementById('tutorial-modal').classList.add('hidden');
    executeDownloads();
}

/* ── 核心下載邏輯（依裝置分流） ── */
function executeDownloads() {
    const items      = getSelected();
    if (!items.length) return;

    const total      = items.length;
    const btnDownload = document.getElementById('btn-download');
    const btnText    = document.getElementById('btn-text');
    const progressWrap = document.getElementById('progress-wrap');
    const progressBar  = document.getElementById('progress-bar');
    const progressLabel = document.getElementById('progress-label');

    btnDownload.disabled = true;
    progressWrap.classList.remove('hidden');

    /* 間隔時間：iOS 開新分頁需要短一點，其餘 800ms */
    const INTERVAL = isIOS ? 600 : 800;

    items.forEach((item, idx) => {
        setTimeout(() => {
            /* 更新 UI */
            btnText.textContent = `下載中 ${idx + 1} / ${total}...`;
            progressLabel.textContent = `${idx + 1} / ${total}`;
            progressBar.style.width = `${Math.round(((idx + 1) / total) * 100)}%`;

            const statusEl = document.getElementById(`status-${idx}`);
            if (statusEl) {
                statusEl.textContent = '下載中';
                statusEl.className   = 'chip chip-loading';
            }

            const fileId = extractFileId(item.url);

            if (isIOS) {
                /* iOS：開新分頁到 Drive 預覽（iframe 在 Safari 完全無效） */
                window.open(item.url, '_blank');
            } else if (fileId) {
                /* Android / 桌機：隱藏 iframe 觸發直接下載 */
                const directUrl = `https://docs.google.com/uc?export=download&id=${fileId}`;
                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                iframe.src = directUrl;
                document.body.appendChild(iframe);
                setTimeout(() => iframe.remove(), 8000);
            } else {
                /* fallback：開新分頁 */
                window.open(item.url, '_blank');
            }

            /* 標記完成（以時間推估，無法直接偵測跨域 iframe） */
            const doneDelay = isIOS ? 200 : 3500;
            setTimeout(() => {
                if (statusEl) {
                    statusEl.textContent = '✓ 完成';
                    statusEl.className   = 'chip chip-done';
                }
            }, doneDelay);

            /* 全部完成後恢復按鈕 */
            if (idx === total - 1) {
                setTimeout(() => {
                    btnDownload.disabled = false;
                    btnText.textContent  = '一鍵下載所有勾選檔案';
                    progressWrap.classList.add('hidden');
                    progressBar.style.width = '0%';

                    if (isIOS) {
                        alert(`已開啟 ${total} 個 Drive 預覽分頁。\n請在每個分頁點「⋯ → 下載」即可儲存。`);
                    } else {
                        alert(`已將 ${total} 個檔案加入下載佇列。\n請至「下載」資料夾查看。`);
                    }
                }, doneDelay + 600);
            }

        }, idx * INTERVAL);
    });
}
</script>
